basePath: /api/v1
definitions:
  model.CreateMemberRequest:
    properties:
      email:
        type: string
      name:
        type: string
      role:
        type: string
    required:
    - email
    - name
    - role
    type: object
  model.Member:
    properties:
      created_at:
        type: string
      email:
        type: string
      id:
        type: string
      name:
        type: string
      role:
        type: string
      updated_at:
        type: string
    type: object
  model.UpdateMemberRequest:
    properties:
      email:
        type: string
      name:
        type: string
      role:
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: API for managing institution member information.
  title: IMS - Institution Management Service API
  version: "1.0"
paths:
  /members:
    get:
      description: Retrieve all members in the institution
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/model.Member'
            type: array
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: List all members
      tags:
      - members
    post:
      consumes:
      - application/json
      description: Add a new member to the institution
      parameters:
      - description: Member payload
        in: body
        name: member
        required: true
        schema:
          $ref: '#/definitions/model.CreateMemberRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/model.Member'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Create a member
      tags:
      - members
  /members/{id}:
    delete:
      description: Remove a member from the institution by ID
      parameters:
      - description: Member ID
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Delete a member
      tags:
      - members
    get:
      description: Retrieve a single member by their ID
      parameters:
      - description: Member ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.Member'
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get a member by ID
      tags:
      - members
    put:
      consumes:
      - application/json
      description: Update one or more fields of an existing member
      parameters:
      - description: Member ID
        in: path
        name: id
        required: true
        type: string
      - description: Fields to update
        in: body
        name: member
        required: true
        schema:
          $ref: '#/definitions/model.UpdateMemberRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.Member'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Update a member
      tags:
      - members
swagger: "2.0"
